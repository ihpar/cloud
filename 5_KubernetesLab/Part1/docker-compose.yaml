# https://docs.docker.com/compose/compose-file/
services:
  my-db:
    build:
      context: ./DB
      dockerfile: Dockerfile
    # container_name: my-db
    image: my-db-image
  my-server:
    build: ./Server
    container_name: my-server
    image: my-server-image
    ports:
      - "80:3000"
    depends_on:
      - my-db